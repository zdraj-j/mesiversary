<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Contigo · Mesiversarios 🤍</title>
  <link rel="icon" type="image/png" href="calendar-heart.png">

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js" defer></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <canvas id="particles-canvas"></canvas>

  <!-- ══════════════════════════════════════════════════════════
       BARRA SUPERIOR: "próximo evento en X"
       Visible solo durante el período de revelación de actividad.
       ══════════════════════════════════════════════════════════ -->
  <div class="next-bar hidden" id="next-bar">
    <i data-lucide="clock" class="next-bar-icon"></i>
    <span id="next-bar-label">Próximo</span>
    <span class="next-bar-time" id="next-bar-time">--:--:--</span>
  </div>

  <!-- La baraja completa de slides (bienvenida, meses pasados,
       countdown y actividades) se genera dinámicamente en app.js
       según la fecha real, de modo que el ciclo se repite cada mes. -->
  <main id="app" class="sections-wrapper">
    <div id="deck"></div>
  </main>

  <nav class="slide-nav" id="slide-nav">
    <button class="nav-btn nav-prev" id="btn-prev" aria-label="Sección anterior">
      <i data-lucide="chevron-left"></i>
    </button>
    <div class="nav-dots" id="nav-dots"></div>
    <button class="nav-btn nav-next" id="btn-next" aria-label="Sección siguiente">
      <i data-lucide="chevron-right"></i>
    </button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
